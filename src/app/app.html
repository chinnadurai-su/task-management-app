<app-header />

<main>
  <ul id="users">
    @for (user of users; track user.id) {
    <li>
      <app-user [user]="user" [selected]="user.id === userService.getSelectedUserId()" />
    </li>
    }
  </ul>
  @if (userName) {
  <app-task [taskUser]="userService.getSelectedUserId()" [userName]="userName" />
  } @else {
  <p id="fallback">Please select a user to view their tasks.</p>
  }
</main>
